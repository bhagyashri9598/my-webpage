<!DOCTYPE html>
<html>
<head>
<title>My First Website</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background-color:#f2f2f2;
}

/* Header */
header{
    background-color:#4CAF50;
    color:white;
    text-align:center;
    padding:20px;
}

/* Navigation bar */
nav{
    background-color:#333;
    text-align:center;
    padding:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-size:18px;
}

nav a:hover{
    color:yellow;
}

/* Main section */
.container{
    padding:30px;
    text-align:center;
}

/* Image */
img{
    width:200px;
    border-radius:50%;
}

/* Button */
button{
    background-color:#4CAF50;
    color:white;
    padding:10px 20px;
    border:none;
    font-size:16px;
    margin-top:10px;
    cursor:pointer;
}

button:hover{
    background-color:darkgreen;
}

/* Footer */
footer{
    background-color:#333;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:30px;
}

</style>

</head>

<body>

<header>
<h1>Welcome to My Website</h1>
<p>This is my first website published on GitHub</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<h2>About Me</h2>

<img src="https://via.placeholder.com/200">

<p>My name is Bhagyashri. I am learning Web Development and Java Programming.</p>

<button>Learn More</button>

<h2>Contact</h2>

<p>Email: example@email.com</p>

</div>

<footer>
<p>© 2026 My Website | Created by Bhagyashri</p>
</footer>

</body>
</html>
